name: Daily NHL Analysis

on:
  schedule:
    # Run at 4:30 PM EDT (20:30 UTC) every day during NHL season
    - cron: '30 20 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  analyze-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push data back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install scipy

      - name: Create config from secrets
        run: |
          cat > config.json << 'EOF'
          {
            "odds_api_key": "${{ secrets.ODDS_API_KEY }}",
            "odds_api_key_two": "${{ secrets.ODDS_API_KEY_TWO }}",
            "odds_api_key_three": "${{ secrets.ODDS_API_KEY_THREE }}"
          }
          EOF

      - name: Restore ML models
        uses: actions/download-artifact@v4
        with:
          name: ml-models
          path: ml_models/
        continue-on-error: true

      - name: Create required directories
        run: mkdir -p data ml_models cache build/nhllines

      - name: Run NHL analysis
        run: python main.py --stake 0.50 --conservative

      - name: Check and update bet results
        run: |
          python -c "
          from src.analysis.bet_tracker import check_results
          check_results(days_back=14)
          "

      - name: Verify performance data updated
        run: |
          echo "=== Data file status ==="
          ls -la data/bet_results.json data/analysis_history.json data/latest_analysis.json 2>/dev/null || true
          python -c "
          import json
          br = json.load(open('data/bet_results.json'))
          results = br.get('results', {})
          dates = sorted([v.get('checked_at','')[:10] for v in results.values() if v.get('checked_at')], reverse=True)
          print(f'Tracked bets: {len(results)}')
          print(f'Most recent check: {dates[0] if dates else \"none\"}')
          won = sum(1 for v in results.values() if v.get('result') == 'won')
          lost = sum(1 for v in results.values() if v.get('result') == 'lost')
          print(f'Record: {won}W-{lost}L')
          "

      - name: Build deploy folder
        run: |
          mkdir -p build/nhllines
          # Root hub page (always rebuilt from source)
          cp web/hub.html build/index.html
          # NHL app files
          cp web/index.html build/nhllines/
          cp web/app.js build/nhllines/
          cp web/styles.css build/nhllines/
          # Data files (with fallbacks)
          cp data/latest_analysis.json build/nhllines/ 2>/dev/null || echo '{"recommendations":[],"games_analyzed":[],"timestamp":""}' > build/nhllines/latest_analysis.json
          cp data/bet_results.json build/nhllines/ 2>/dev/null || echo '{"results":{}}' > build/nhllines/bet_results.json
          cp data/analysis_history.json build/nhllines/ 2>/dev/null || true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only hosting --project projects-brawlstars --non-interactive

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all data files
          git add data/bet_results.json data/analysis_history.json data/latest_analysis.json

          # Only commit+push if there are changes
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update NHL data [$(date +'%Y-%m-%d %H:%M')]"

            # Pull with rebase to handle any concurrent commits
            git pull --rebase origin main || {
              echo "::warning::Rebase failed, trying merge strategy"
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase -X theirs origin main
            }

            git push
            echo "✅ Data committed and pushed to repo"
          fi

      - name: Save ML models
        uses: actions/upload-artifact@v4
        with:
          name: ml-models
          path: ml_models/
          retention-days: 90
          overwrite: true
